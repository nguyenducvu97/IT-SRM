<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Modal</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div style="padding: 20px;">
        <h1>Debug Modal Issue</h1>
        
        <button onclick="debugModal()" class="btn btn-danger">
            <i class="fas fa-bug"></i> Debug Reject Modal
        </button>
        
        <div id="debugOutput" style="margin-top: 20px; padding: 10px; background: #f5f5f5; font-family: monospace; white-space: pre-wrap;"></div>
    </div>

    <!-- Reject Request Modal -->
    <div id="rejectModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-times"></i> Từ chối yêu cầu</h3>
                <button class="close-btn" onclick="closeDebugModal()">&times;</button>
            </div>
            <form id="rejectForm" onsubmit="handleDebugSubmit(event)">
                <div class="form-group">
                    <label for="rejectReason">Lý do từ chối *</label>
                    <textarea id="rejectReason" name="reject_reason" rows="4" required placeholder="Vui lòng nhập lý do từ chối yêu cầu này..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="rejectDetails">Chi tiết bổ sung</label>
                    <textarea id="rejectDetails" name="reject_details" rows="3" placeholder="Thông tin bổ sung về lý do từ chối..."></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-times"></i> Gửi yêu cầu từ chối
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="closeDebugModal()">
                        <i class="fas fa-arrow-left"></i> Hủy
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function log(message) {
            const output = document.getElementById('debugOutput');
            const timestamp = new Date().toLocaleTimeString();
            output.textContent += `[${timestamp}] ${message}\n`;
        }

        function debugModal() {
            log('=== DEBUG MODAL START ===');
            
            // Check if modal exists
            const modal = document.getElementById('rejectModal');
            log(`Modal element found: ${!!modal}`);
            
            if (modal) {
                // Check modal styles
                const styles = window.getComputedStyle(modal);
                log(`Modal display: ${styles.display}`);
                log(`Modal position: ${styles.position}`);
                log(`Modal z-index: ${styles.zIndex}`);
                log(`Modal width: ${styles.width}`);
                log(`Modal height: ${styles.height}`);
                log(`Modal background: ${styles.backgroundColor}`);
                
                // Check modal content
                const modalContent = modal.querySelector('.modal-content');
                log(`Modal content found: ${!!modalContent}`);
                
                if (modalContent) {
                    const contentStyles = window.getComputedStyle(modalContent);
                    log(`Content display: ${contentStyles.display}`);
                    log(`Content margin: ${contentStyles.margin}`);
                    log(`Content width: ${contentStyles.width}`);
                }
                
                // Check if modal is visible in viewport
                const rect = modal.getBoundingClientRect();
                log(`Modal rect: ${JSON.stringify(rect)}`);
                log(`Modal in viewport: ${rect.top >= 0 && rect.left >= 0 && rect.bottom <= window.innerHeight && rect.right <= window.innerWidth}`);
                
                // Try to show modal
                log('Setting modal display to block...');
                modal.style.display = 'block';
                
                // Check again after setting display
                setTimeout(() => {
                    const newStyles = window.getComputedStyle(modal);
                    log(`After setting display - Modal display: ${newStyles.display}`);
                    
                    // Check if modal is actually visible
                    const isVisible = modal.offsetWidth > 0 && modal.offsetHeight > 0;
                    log(`Modal is visible: ${isVisible}`);
                    
                    // Check computed visibility
                    const computedVisibility = newStyles.visibility !== 'hidden' && newStyles.opacity !== '0';
                    log(`Computed visibility: ${computedVisibility}`);
                    
                    log('=== DEBUG MODAL END ===');
                }, 100);
                
            } else {
                log('ERROR: Modal element not found!');
            }
        }

        function closeDebugModal() {
            const modal = document.getElementById('rejectModal');
            if (modal) {
                modal.style.display = 'none';
                log('Modal closed');
            }
        }

        function handleDebugSubmit(event) {
            event.preventDefault();
            log('Form submitted (debug only)');
            closeDebugModal();
        }

        // Add click outside to close
        window.addEventListener('click', function(event) {
            const modal = document.getElementById('rejectModal');
            if (event.target === modal) {
                closeDebugModal();
                log('Modal closed by clicking outside');
            }
        });

        // Check for CSS conflicts
        window.addEventListener('load', function() {
            log('=== CSS CHECK ===');
            
            // Check if modal CSS is loaded
            const testElement = document.createElement('div');
            testElement.className = 'modal';
            document.body.appendChild(testElement);
            
            const testStyles = window.getComputedStyle(testElement);
            log(`Test modal display: ${testStyles.display}`);
            log(`Test modal position: ${testStyles.position}`);
            log(`Test modal z-index: ${testStyles.zIndex}`);
            
            document.body.removeChild(testElement);
            
            log('CSS check completed');
        });
    </script>
</body>
</html>
