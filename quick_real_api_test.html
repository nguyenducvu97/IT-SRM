<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Real API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .success { color: green; background: #d4edda; padding: 10px; border-radius: 4px; }
        .error { color: red; background: #f8d7da; padding: 10px; border-radius: 4px; }
        .info { color: blue; background: #d1ecf1; padding: 10px; border-radius: 4px; }
        button { padding: 10px 15px; margin: 5px; border: none; border-radius: 4px; cursor: pointer; background: #007bff; color: white; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🚀 Quick Real API Test</h1>
    
    <button onclick="testRealApi()">Test Real API POST</button>
    <div id="result"></div>

    <script>
        async function testRealApi() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="info">🔍 Testing Real API...</div>';
            
            try {
                // Create test FormData exactly like the working debug API
                const formData = new FormData();
                formData.append('action', 'reject_request');
                formData.append('request_id', '1');
                formData.append('reject_reason', 'Test real API quick');
                formData.append('reject_details', 'Quick test for real API');
                
                // Add a test file
                const testContent = 'Test file for real API\nCreated: ' + new Date().toISOString();
                const blob = new Blob([testContent], { type: 'text/plain' });
                const file = new File([blob], 'quick_test_real_api.txt', { type: 'text/plain' });
                formData.append('attachments[]', file);
                
                console.log('FormData contents:');
                for (let [key, value] of formData.entries()) {
                    if (value instanceof File) {
                        console.log(`${key}: File(${value.name}, ${value.size} bytes, ${value.type})`);
                    } else {
                        console.log(`${key}: ${value}`);
                    }
                }
                
                console.log('Sending POST request to real API...');
                
                const response = await fetch('api/service_requests.php', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);
                
                const result = await response.json();
                console.log('Response data:', result);
                
                if (result.success) {
                    let html = '<div class="success">🎉 REAL API SUCCESS!</div>';
                    html += `<div class="info">Message: ${result.message}</div>`;
                    
                    if (result.reject_id) {
                        html += `<div class="info">Reject ID: ${result.reject_id}</div>`;
                    }
                    
                    if (result.uploaded_files && result.uploaded_files.length > 0) {
                        html += '<div class="success">📎 Files uploaded successfully:</div>';
                        result.uploaded_files.forEach(file => {
                            html += `<div class="info">- ${file.original_name} (${file.file_size} bytes)</div>`;
                        });
                    }
                    
                    resultDiv.innerHTML = html;
                } else {
                    let html = '<div class="error">❌ Real API failed</div>';
                    html += `<div class="error">Message: ${result.message}</div>`;
                    
                    if (result.debug_info) {
                        html += '<div class="info"><strong>Debug Info:</strong></div>';
                        html += '<pre>' + JSON.stringify(result.debug_info, null, 2) + '</pre>';
                    }
                    
                    resultDiv.innerHTML = html;
                }
                
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<div class="error">❌ Network error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
