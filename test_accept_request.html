<!DOCTYPE html>
<html>
<head>
    <title>Nhận Yêu cầu - Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        .warning { color: orange; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        .btn-success { background: green; color: white; }
        .btn-info { background: blue; color: white; }
        .btn-warning { background: orange; color: white; }
        .request-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; }
        .request-meta { font-size: 0.9em; color: #666; }
    </style>
</head>
<body>
    <h1>Chức năng Nhận Yêu cầu của Staff</h1>
    
    <div class="test-section">
        <h2>1. Kiểm tra User hiện tại</h2>
        <button onclick="checkUser()" class="btn-info">Check User</button>
        <div id="userInfo"></div>
    </div>
    
    <div class="test-section">
        <h2>2. Tìm các yêu cầu có thể nhận</h2>
        <button onclick="findOpenRequests()" class="btn-success">Tìm yêu cầu Open</button>
        <div id="openRequests"></div>
    </div>
    
    <div class="test-section">
        <h2>3. Tạo yêu cầu Open để test</h2>
        <button onclick="createTestRequest()" class="btn-warning">Tạo yêu cầu test</button>
        <div id="createResult"></div>
    </div>
    
    <div class="test-section">
        <h2>4. Test nhận yêu cầu</h2>
        <div id="acceptTest"></div>
    </div>

    <script>
        let currentUser = null;
        
        // Check current user
        async function checkUser() {
            try {
                const response = await fetch('/it-service-request/api/auth.php?action=check_session', {
                    credentials: 'include'
                });
                const result = await response.json();
                
                const userInfo = document.getElementById('userInfo');
                if (result.success) {
                    currentUser = result.data;
                    userInfo.innerHTML = `
                        <div class="success">✅ User logged in</div>
                        <div class="info">ID: ${currentUser.id}</div>
                        <div class="info">Username: ${currentUser.username}</div>
                        <div class="info">Role: ${currentUser.role}</div>
                        <div class="info">Full Name: ${currentUser.full_name}</div>
                        <div class="info">Email: ${currentUser.email}</div>
                        ${currentUser.role === 'staff' ? '<div class="success">✅ User là Staff - có thể nhận yêu cầu</div>' : '<div class="warning">⚠️ User không phải Staff</div>'}
                    `;
                } else {
                    userInfo.innerHTML = `<div class="error">❌ Not logged in: ${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('userInfo').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        // Find open requests
        async function findOpenRequests() {
            if (!currentUser) {
                document.getElementById('openRequests').innerHTML = '<div class="warning">⚠️ Vui lòng check user trước</div>';
                return;
            }
            
            try {
                const response = await fetch('/it-service-request/api/service_requests.php?action=list&status=open', {
                    credentials: 'include'
                });
                const result = await response.json();
                
                const openRequestsDiv = document.getElementById('openRequests');
                if (result.success) {
                    if (result.data.length > 0) {
                        let html = `<div class="success">✅ Tìm thấy ${result.data.length} yêu cầu open:</div>`;
                        result.data.forEach(request => {
                            const canAccept = request.status === 'open' && !request.assigned_to && currentUser.role === 'staff';
                            html += `
                                <div class="request-card">
                                    <h4>#${request.id} - ${request.title}</h4>
                                    <div class="request-meta">
                                        <div>Người tạo: ${request.requester_name}</div>
                                        <div>Danh mục: ${request.category_name}</div>
                                        <div>Ưu tiên: ${request.priority}</div>
                                        <div>Trạng thái: ${request.status}</div>
                                        <div>Assigned to: ${request.assigned_to || 'NULL'}</div>
                                        <div>Ngày tạo: ${request.created_at}</div>
                                    </div>
                                    ${canAccept ? `
                                        <button class="btn-success" onclick="acceptRequest(${request.id})">
                                            <i class="fas fa-check"></i> Nhận yêu cầu #${request.id}
                                        </button>
                                    ` : '<div class="warning">⚠️ Không thể nhận yêu cầu này</div>'}
                                </div>
                            `;
                        });
                        openRequestsDiv.innerHTML = html;
                    } else {
                        openRequestsDiv.innerHTML = '<div class="warning">⚠️ Không có yêu cầu nào ở trạng thái open</div>';
                    }
                } else {
                    openRequestsDiv.innerHTML = `<div class="error">❌ Error: ${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('openRequests').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        // Create test request
        async function createTestRequest() {
            if (!currentUser) {
                document.getElementById('createResult').innerHTML = '<div class="warning">⚠️ Vui lòng check user trước</div>';
                return;
            }
            
            try {
                const testData = {
                    title: 'Yêu cầu test để nhận - ' + new Date().toLocaleString(),
                    description: 'Đây là yêu cầu test để kiểm tra chức năng nhận yêu cầu của staff',
                    category_id: 1,
                    priority: 'medium',
                    action: 'create'
                };
                
                const response = await fetch('/it-service-request/api/service_requests.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testData),
                    credentials: 'include'
                });
                
                const result = await response.json();
                const createResultDiv = document.getElementById('createResult');
                
                if (result.success) {
                    createResultDiv.innerHTML = `
                        <div class="success">✅ Đã tạo yêu cầu test #${result.data.id}</div>
                        <div class="info">Tiêu đề: ${result.data.title}</div>
                        <div class="info">Trạng thái: ${result.data.status}</div>
                        <button class="btn-success" onclick="acceptRequest(${result.data.id})">Nhận ngay yêu cầu này</button>
                    `;
                } else {
                    createResultDiv.innerHTML = `<div class="error">❌ Lỗi tạo yêu cầu: ${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('createResult').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        // Accept request
        async function acceptRequest(requestId) {
            try {
                const acceptData = {
                    action: 'accept_request',
                    request_id: requestId
                };
                
                const response = await fetch('/it-service-request/api/service_requests.php', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(acceptData),
                    credentials: 'include'
                });
                
                const result = await response.json();
                const acceptTestDiv = document.getElementById('acceptTest');
                
                if (result.success) {
                    acceptTestDiv.innerHTML = `
                        <div class="success">✅ Đã nhận yêu cầu #${requestId} thành công!</div>
                        <div class="info">Status: ${result.message}</div>
                        <button class="btn-info" onclick="findOpenRequests()">Tìm lại các yêu cầu open</button>
                    `;
                } else {
                    acceptTestDiv.innerHTML = `<div class="error">❌ Lỗi nhận yêu cầu: ${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('acceptTest').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        // Auto-check user on load
        checkUser();
    </script>
</body>
</html>
