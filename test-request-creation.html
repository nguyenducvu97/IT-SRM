<!DOCTYPE html>
<html>
<head>
    <title>Test Request Creation</title>
</head>
<body>
    <h2>🧪 Test Service Request Creation</h2>
    <form id="testForm">
        <div>
            <label>Title:</label><br>
            <input type="text" id="title" value="Test Request <?= date('Y-m-d H:i:s') ?>" size="50">
        </div>
        <br>
        <div>
            <label>Description:</label><br>
            <textarea id="description" rows="4" cols="50">This is a test request to verify email notifications work correctly.</textarea>
        </div>
        <br>
        <div>
            <label>Category:</label><br>
            <select id="category_id">
                <option value="1">Hardware</option>
                <option value="2">Software</option>
                <option value="3">Network</option>
                <option value="4">Security</option>
                <option value="5">Account</option>
                <option value="6">Other</option>
            </select>
        </div>
        <br>
        <div>
            <label>Priority:</label><br>
            <select id="priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
            </select>
        </div>
        <br>
        <button type="button" onclick="testCreateRequest()">Create Test Request</button>
    </form>
    
    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>
    
    <script>
        function testCreateRequest() {
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                category_id: parseInt(document.getElementById('category_id').value),
                priority: document.getElementById('priority').value
            };
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>⏳ Creating request...</p>';
            
            fetch('api/service_requests.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    resultDiv.innerHTML = `
                        <p style="color: green; font-weight: bold;">✅ Request created successfully!</p>
                        <p><strong>Request ID:</strong> ${result.data.id}</p>
                        <p><strong>Message:</strong> ${result.message}</p>
                        <p>📧 Email notifications should be sent to admin and staff.</p>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p style="color: red; font-weight: bold;">❌ Failed to create request</p>
                        <p><strong>Error:</strong> ${result.message}</p>
                    `;
                }
            })
            .catch(error => {
                resultDiv.innerHTML = `
                    <p style="color: red; font-weight: bold;">❌ Network error</p>
                    <p><strong>Error:</strong> ${error.message}</p>
                `;
            });
        }
    </script>
</body>
</html>
