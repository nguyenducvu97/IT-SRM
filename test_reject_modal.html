<!DOCTYPE html>
<html>
<head>
    <title>Test Reject Modal</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div style="padding: 20px;">
        <h1>Test Reject Modal Functionality</h1>
        
        <button onclick="testModal()" class="btn btn-primary">
            <i class="fas fa-gavel"></i> Test Reject Modal
        </button>
        
        <div id="testResult" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>
    </div>

    <!-- Admin Reject Request Modal (copied from main HTML) -->
    <div id="adminRejectModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3><i class="fas fa-user-shield"></i> Xử lý yêu cầu từ chối</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <div id="adminRejectRequestDetails">
                    <!-- Reject request details will be loaded here -->
                </div>
                
                <form id="adminRejectForm">
                    <input type="hidden" id="adminRejectId">
                    
                    <div class="form-section">
                        <h4><i class="fas fa-gavel"></i> Quyết định</h4>
                        <div class="form-group">
                            <label for="decision">Quyết định *</label>
                            <select id="decision" name="decision" required>
                                <option value="">-- Chọn quyết định --</option>
                                <option value="approved">Đồng ý từ chối</option>
                                <option value="rejected">Từ chối yêu cầu từ chối</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="reason">Lý do quyết định *</label>
                            <textarea id="reason" name="reason" rows="3" required placeholder="Nhập lý do cho quyết định của bạn..."></textarea>
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-check"></i> Xác nhận quyết định
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">
                            <i class="fas fa-times"></i> Đóng
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function testModal() {
            const result = document.getElementById('testResult');
            
            try {
                // Check if modal exists
                const modal = document.getElementById('adminRejectModal');
                if (!modal) {
                    throw new Error('Modal not found');
                }
                
                // Check modal form
                const form = document.getElementById('adminRejectForm');
                if (!form) {
                    throw new Error('Modal form not found');
                }
                
                // Check modal ID input
                const idInput = document.getElementById('adminRejectId');
                if (!idInput) {
                    throw new Error('Modal ID input not found');
                }
                
                // Simulate showing modal
                idInput.value = '123';
                form.reset();
                modal.style.display = 'block';
                
                result.innerHTML = `
                    <div style="background: #d4edda; color: #155724; padding: 10px;">
                        <h4>✅ Modal Test Successful</h4>
                        <p>Modal elements found and displayed successfully.</p>
                        <p>Modal should now be visible on screen.</p>
                    </div>
                `;
                
            } catch (error) {
                result.innerHTML = `
                    <div style="background: #f8d7da; color: #721c24; padding: 10px;">
                        <h4>❌ Modal Test Failed</h4>
                        <p>Error: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        function closeModal() {
            const modal = document.getElementById('adminRejectModal');
            if (modal) {
                modal.style.display = 'none';
                document.getElementById('testResult').innerHTML = '<p>Modal closed.</p>';
            }
        }
        
        // Add close button functionality
        document.addEventListener('DOMContentLoaded', function() {
            const closeBtn = document.querySelector('#adminRejectModal .close');
            if (closeBtn) {
                closeBtn.onclick = closeModal;
            }
            
            // Close modal when clicking outside
            window.onclick = function(event) {
                const modal = document.getElementById('adminRejectModal');
                if (event.target == modal) {
                    closeModal();
                }
            }
        });
    </script>
</body>
</html>
