<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài KPI - Cài KPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .config-card {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background: #f8f9fa;
        }
        .config-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px 8px 0 0;
            margin: -20px -20px 20px -20px;
        }
        .formula-input {
            font-family: 'Courier New', monospace;
            background: #f8f9fa;
            border: 1px solid #ced4da;
            border-radius: 4px;
            padding: 8px;
        }
        .weight-badge {
            background: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .btn-reset {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-reset:hover {
            background: #c82333;
        }
        .total-weight {
            background: #007bff;
            color: white;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <h2 class="mb-4">
                    <i class="fas fa-cogs"></i> Cài KPI - Cài KPI
                </h2>
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <button class="btn btn-primary" onclick="saveConfig()">
                            <i class="fas fa-save"></i> Lúc
                        </button>
                        <button class="btn btn-reset" onclick="resetConfig()">
                            <i class="fas fa-undo"></i> Cài
                        </button>
                    </div>
                    <div class="total-weight" id="totalWeight">
                        Tng trng: 100%
                    </div>
                </div>

                <div id="configContainer">
                    <!-- KPI configurations will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Modal -->
    <div class="modal fade" id="loadingModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-body text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">Processing...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let kpiConfigs = [];

        // Load KPI configurations
        function loadKPIConfig() {
            showLoading();
            fetch('api/kpi_config.php?action=get_config')
                .then(response => response.json())
                .then(data => {
                    hideLoading();
                    if (data.success) {
                        kpiConfigs = data.data;
                        renderConfigForm();
                        updateTotalWeight();
                    } else {
                        showNotification('Error loading KPI configuration', 'error');
                    }
                })
                .catch(error => {
                    hideLoading();
                    showNotification('Network error', 'error');
                });
        }

        // Render configuration form
        function renderConfigForm() {
            const container = document.getElementById('configContainer');
            container.innerHTML = '';

            kpiConfigs.forEach(config => {
                const configCard = document.createElement('div');
                configCard.className = 'config-card';
                
                const isTotal = config.kpi_type === 'TOTAL';
                
                configCard.innerHTML = `
                    <div class="config-header">
                        <h5 class="mb-0">
                            ${config.kpi_type} - ${isTotal ? 'KPI Tng hp' : 'KPI ' + config.kpi_type}
                            <span class="weight-badge ms-2">${config.weight_percentage}%</span>
                        </h5>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Cng thc:</label>
                                <input type="text" class="form-control formula-input" 
                                       id="formula_${config.kpi_type}" 
                                       value="${config.formula}"
                                       ${isTotal ? 'readonly' : ''}>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">M t:</label>
                                <textarea class="form-control" 
                                          id="description_${config.kpi_type}" 
                                          rows="3">${config.description}</textarea>
                            </div>
                        </div>
                    </div>
                    
                    ${!isTotal ? `
                    <div class="row">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label class="form-label">Trng s (%):</label>
                                <input type="number" class="form-control" 
                                       id="weight_${config.kpi_type}" 
                                       value="${config.weight_percentage}"
                                       min="0" max="100" step="0.01"
                                       onchange="updateTotalWeight()">
                            </div>
                        </div>
                    </div>
                    ` : ''}
                `;
                
                container.appendChild(configCard);
            });
        }

        // Update total weight display
        function updateTotalWeight() {
            let totalWeight = 0;
            kpiConfigs.forEach(config => {
                if (config.kpi_type !== 'TOTAL') {
                    const weightInput = document.getElementById(`weight_${config.kpi_type}`);
                    if (weightInput) {
                        totalWeight += parseFloat(weightInput.value) || 0;
                    }
                }
            });
            
            const totalWeightElement = document.getElementById('totalWeight');
            totalWeightElement.textContent = `Tng trng: ${totalWeight.toFixed(2)}%`;
            
            if (totalWeight !== 100) {
                totalWeightElement.style.background = '#dc3545';
            } else {
                totalWeightElement.style.background = '#007bff';
            }
        }

        // Save configuration
        function saveConfig() {
            showLoading();
            
            const updatedConfigs = kpiConfigs.map(config => {
                const formula = document.getElementById(`formula_${config.kpi_type}`).value;
                const description = document.getElementById(`description_${config.kpi_type}`).value;
                const weight = config.kpi_type !== 'TOTAL' 
                    ? parseFloat(document.getElementById(`weight_${config.kpi_type}`).value) || 0
                    : config.weight_percentage;
                
                return {
                    kpi_type: config.kpi_type,
                    formula: formula,
                    description: description,
                    weight_percentage: weight
                };
            });

            fetch('api/kpi_config.php?action=save_config', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(updatedConfigs)
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    showNotification('KPI configuration saved successfully!', 'success');
                    loadKPIConfig(); // Reload to get updated data
                } else {
                    showNotification(data.message || 'Error saving configuration', 'error');
                }
            })
            .catch(error => {
                hideLoading();
                showNotification('Network error', 'error');
            });
        }

        // Reset configuration
        function resetConfig() {
            if (!confirm('Are you sure you want to reset KPI configuration to default?')) {
                return;
            }
            
            showLoading();
            
            fetch('api/kpi_config.php?action=reset_config', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    showNotification('KPI configuration reset to default!', 'success');
                    loadKPIConfig();
                } else {
                    showNotification(data.message || 'Error resetting configuration', 'error');
                }
            })
            .catch(error => {
                hideLoading();
                showNotification('Network error', 'error');
            });
        }

        // Show/hide loading modal
        function showLoading() {
            const modal = new bootstrap.Modal(document.getElementById('loadingModal'));
            modal.show();
        }

        function hideLoading() {
            const modal = bootstrap.Modal.getInstance(document.getElementById('loadingModal'));
            if (modal) {
                modal.hide();
            }
        }

        // Show notification (you can implement this based on your existing notification system)
        function showNotification(message, type = 'info') {
            // Simple alert for now, replace with your notification system
            alert(message);
        }

        // Load configuration on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadKPIConfig();
        });
    </script>
</body>
</html>
