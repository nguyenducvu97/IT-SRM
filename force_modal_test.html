<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Force Modal Test</title>
    <style>
        /* Override everything */
        * {
            box-sizing: border-box !important;
        }
        
        body {
            margin: 0 !important;
            padding: 20px !important;
            font-family: Arial !important;
        }
        
        .force-modal {
            display: none !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            background: rgba(255, 0, 0, 0.9) !important;
            z-index: 999999 !important;
            justify-content: center !important;
            align-items: center !important;
        }
        
        .force-modal.show {
            display: flex !important;
        }
        
        .force-modal-content {
            background: yellow !important;
            border: 5px solid red !important;
            padding: 30px !important;
            border-radius: 10px !important;
            max-width: 500px !important;
            width: 90% !important;
            text-align: center !important;
        }
        
        .btn {
            padding: 10px 20px !important;
            margin: 5px !important;
            border: none !important;
            border-radius: 5px !important;
            cursor: pointer !important;
            font-size: 16px !important;
        }
        
        .btn-danger {
            background: #dc3545 !important;
            color: white !important;
        }
        
        .btn-secondary {
            background: #6c757d !important;
            color: white !important;
        }
    </style>
</head>
<body>
    <h1>Force Modal Test - Bypass All CSS</h1>
    
    <button class="btn btn-danger" onclick="showForceModal()">
        Show Forced Modal
    </button>
    
    <button class="btn btn-secondary" onclick="hideForceModal()">
        Hide Forced Modal
    </button>
    
    <div id="debugInfo"></div>
    
    <!-- Forced Modal -->
    <div id="forceModal" class="force-modal">
        <div class="force-modal-content">
            <h2>🚨 FORCED MODAL 🚨</h2>
            <p>This modal bypasses all CSS conflicts!</p>
            <p>If you can see this RED background and YELLOW content, the modal system works.</p>
            <br>
            <button class="btn btn-secondary" onclick="hideForceModal()">
                Close
            </button>
        </div>
    </div>

    <script>
        function log(message) {
            const debug = document.getElementById('debugInfo');
            debug.innerHTML += `<p>${new Date().toLocaleTimeString()}: ${message}</p>`;
        }

        function showForceModal() {
            log('=== FORCE MODAL TEST ===');
            
            const modal = document.getElementById('forceModal');
            log(`Modal found: ${!!modal}`);
            
            if (modal) {
                // Force show with multiple methods
                modal.style.display = 'flex';
                modal.style.visibility = 'visible';
                modal.style.opacity = '1';
                modal.classList.add('show');
                
                log('Modal forced to show');
                log('You should see RED background and YELLOW content');
                
                // Check dimensions
                setTimeout(() => {
                    const rect = modal.getBoundingClientRect();
                    log(`Modal dimensions: ${rect.width}x${rect.height}`);
                    log(`Modal position: ${rect.left}, ${rect.top}`);
                    
                    if (rect.width > 0 && rect.height > 0) {
                        log('✅ SUCCESS: Modal is visible!');
                    } else {
                        log('❌ FAILED: Modal still has zero dimensions');
                    }
                }, 100);
                
            } else {
                log('❌ ERROR: Modal not found');
            }
        }

        function hideForceModal() {
            const modal = document.getElementById('forceModal');
            if (modal) {
                modal.style.display = 'none';
                modal.classList.remove('show');
                log('Modal hidden');
            }
        }

        // Auto-test on load
        window.addEventListener('load', function() {
            log('Page loaded, testing modal in 2 seconds...');
            setTimeout(showForceModal, 2000);
        });
    </script>
</body>
</html>
