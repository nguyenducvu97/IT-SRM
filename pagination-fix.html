<!-- Pagination Container Addition Script -->
<script>
// Add users pagination container
const usersList = document.getElementById('usersList');
if (usersList) {
    const usersPagination = document.createElement('div');
    usersPagination.id = 'usersPagination';
    usersPagination.className = 'pagination';
    usersList.parentNode.insertBefore(usersPagination, usersList.nextSibling);
    console.log('Added usersPagination container');
}

// Add category pagination container  
const categoryRequestsList = document.getElementById('categoryRequestsList');
if (categoryRequestsList) {
    const categoryPagination = document.createElement('div');
    categoryPagination.id = 'categoryPagination';
    categoryPagination.className = 'pagination';
    categoryRequestsList.parentNode.insertBefore(categoryPagination, categoryRequestsList.nextSibling);
    console.log('Added categoryPagination container');
}
</script>
