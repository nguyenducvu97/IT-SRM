<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Reject Modal Test</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div style="padding: 20px;">
        <h1>Direct Reject Modal Test</h1>
        
        <button onclick="testModal()" class="btn btn-danger">
            <i class="fas fa-times"></i> Test Reject Modal Directly
        </button>
        
        <button onclick="testWithObject()" class="btn btn-primary">
            <i class="fas fa-play"></i> Test with requestDetailApp Object
        </button>
        
        <div id="testResults" style="margin-top: 20px; padding: 10px; background: #f5f5f5;"></div>
    </div>

    <!-- Reject Request Modal (copied from request-detail.html) -->
    <div id="rejectModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-times"></i> Từ chối yêu cầu</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="rejectForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label for="rejectReason">Lý do từ chối *</label>
                    <textarea id="rejectReason" name="reject_reason" rows="4" required placeholder="Vui lòng nhập lý do từ chối yêu cầu này..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="rejectDetails">Chi tiết bổ sung</label>
                    <textarea id="rejectDetails" name="reject_details" rows="3" placeholder="Thông tin bổ sung về lý do từ chối..."></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-times"></i> Gửi yêu cầu từ chối
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">
                        <i class="fas fa-arrow-left"></i> Hủy
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function log(message) {
            const results = document.getElementById('testResults');
            const timestamp = new Date().toLocaleTimeString();
            results.innerHTML += `<p>[${timestamp}] ${message}</p>`;
        }

        function testModal() {
            log('=== Direct Modal Test ===');
            
            const modal = document.getElementById('rejectModal');
            log(`Modal found: ${!!modal}`);
            
            if (modal) {
                log('Current modal display: ' + window.getComputedStyle(modal).display);
                log('Current modal z-index: ' + window.getComputedStyle(modal).zIndex);
                
                // Show modal
                modal.style.display = 'block';
                log('Set modal display to block');
                log('New modal display: ' + window.getComputedStyle(modal).display);
                
                // Check modal content
                const modalContent = modal.querySelector('.modal-content');
                if (modalContent) {
                    log('Modal content found');
                    log('Modal content display: ' + window.getComputedStyle(modalContent).display);
                    log('Modal content z-index: ' + window.getComputedStyle(modalContent).zIndex);
                } else {
                    log('Modal content NOT found');
                }
                
                log('Modal should now be visible!');
            } else {
                log('ERROR: Modal not found!');
            }
        }

        function testWithObject() {
            log('=== Object Test ===');
            
            // Create mock requestDetailApp object
            window.requestDetailApp = {
                rejectRequestId: null,
                showRejectModal: function(requestId) {
                    log(`showRejectModal called with ID: ${requestId}`);
                    
                    const modal = document.getElementById('rejectModal');
                    log(`Modal found: ${!!modal}`);
                    
                    if (modal) {
                        modal.style.display = 'block';
                        this.rejectRequestId = requestId;
                        log('Modal displayed via object method');
                    } else {
                        log('ERROR: Modal not found in object method!');
                    }
                },
                closeRejectModal: function() {
                    const modal = document.getElementById('rejectModal');
                    if (modal) {
                        modal.style.display = 'none';
                        document.getElementById('rejectForm').reset();
                        this.rejectRequestId = null;
                        log('Modal closed via object method');
                    }
                }
            };
            
            // Test the object method
            requestDetailApp.showRejectModal(123);
        }

        function closeModal() {
            const modal = document.getElementById('rejectModal');
            if (modal) {
                modal.style.display = 'none';
                document.getElementById('rejectForm').reset();
                log('Modal closed');
            }
        }

        function handleSubmit(event) {
            event.preventDefault();
            log('Form submitted (test only)');
            const formData = new FormData(event.target);
            log('Reason: ' + formData.get('reject_reason'));
            log('Details: ' + formData.get('reject_details'));
            closeModal();
        }

        // Add click outside to close
        window.addEventListener('click', function(event) {
            const modal = document.getElementById('rejectModal');
            if (event.target === modal) {
                closeModal();
                log('Modal closed by clicking outside');
            }
        });

        // Add close button functionality
        document.addEventListener('DOMContentLoaded', function() {
            const closeBtn = document.querySelector('.close-btn');
            if (closeBtn) {
                closeBtn.addEventListener('click', closeModal);
                log('Close button event added');
            }
        });
    </script>
</body>
</html>
