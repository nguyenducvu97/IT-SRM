<!DOCTYPE html>
<html>
<head>
    <title>Debug Notification Click</title>
    <script>
        // Simulate the notification data
        const testNotification = {
            id: 108,
            user_id: 1,
            title: "Yêu cầu từ chối cần xác nhận",
            message: "Nhân viên John Smith nhận thấy yêu cầu #17 - Test thời gian đăng ký vi phạm chính sách hoặc không khả thi và cần Admin xác nhận trước khi hủy. Lý do: 545 - 3232.",
            type: "warning",
            related_id: 17,
            related_type: "service_request",
            is_read: 0,
            created_at: "2026-04-03 13:01:08"
        };
        
        // Test navigation logic
        function testNotificationClick() {
            console.log("Testing notification click...");
            console.log("Notification data:", testNotification);
            
            // Simulate the switch statement from notifications.js
            const type = testNotification.related_type;
            const id = testNotification.related_id;
            
            console.log("Related Type:", type);
            console.log("Related ID:", id);
            
            let expectedUrl = '';
            switch (type) {
                case 'request':
                case 'service_request':
                    expectedUrl = `request-detail.html?id=${id}`;
                    console.log("✅ Matched case 'service_request'");
                    break;
                case 'support_request':
                    expectedUrl = 'support-requests.html';
                    break;
                case 'reject_request':
                    expectedUrl = 'reject-requests.html';
                    break;
                default:
                    expectedUrl = 'index.html';
            }
            
            console.log("Expected URL:", expectedUrl);
            
            // Test the URL
            const link = document.getElementById('testLink');
            link.href = expectedUrl;
            link.textContent = expectedUrl;
            link.style.display = 'inline-block';
            
            document.getElementById('result').innerHTML = `
                <h3>✅ Test Results:</h3>
                <p><strong>Related Type:</strong> ${type}</p>
                <p><strong>Related ID:</strong> ${id}</p>
                <p><strong>Expected URL:</strong> ${expectedUrl}</p>
                <p><strong>Status:</strong> Should navigate to request detail page</p>
            `;
        }
        
        window.onload = function() {
            testNotificationClick();
        };
    </script>
</head>
<body>
    <h2>Debug Notification Click for Request #17</h2>
    
    <div id="result">
        <p>Testing...</p>
    </div>
    
    <h3>Test Navigation Link:</h3>
    <a id="testLink" href="#" target="_blank" style="display: none;">Test Link</a>
    
    <h3>Manual Test:</h3>
    <p>1. Click the test link above</p>
    <p>2. Verify it goes to request-detail.html?id=17</p>
    <p>3. Check if the request detail page loads correctly</p>
</body>
</html>
