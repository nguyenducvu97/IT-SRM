<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test User Filters</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .success { color: green; }
        .error { color: red; }
        .warning { color: orange; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 Test User Filters Functionality</h1>
    
    <div class="test-section">
        <h2>📋 Test Checklist</h2>
        <div id="testResults">
            <div class="warning">⏳ Running tests...</div>
        </div>
    </div>

    <div class="test-section">
        <h2>🔍 Debug Information</h2>
        <div id="debugInfo">
            <div class="warning">⏳ Loading debug info...</div>
        </div>
    </div>

    <div class="test-section">
        <h2>📝 Console Logs</h2>
        <div id="consoleLogs">
            <div class="warning">⏳ Waiting for console logs...</div>
        </div>
    </div>

    <script>
        // Test results container
        const testResults = document.getElementById('testResults');
        const debugInfo = document.getElementById('debugInfo');
        const consoleLogs = document.getElementById('consoleLogs');
        
        // Capture console logs
        const originalLog = console.log;
        const originalWarn = console.warn;
        const originalError = console.error;
        
        const logs = [];
        
        function captureLog(type, ...args) {
            const message = args.map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
            ).join(' ');
            
            logs.push({
                type: type,
                message: message,
                timestamp: new Date().toLocaleTimeString()
            });
            
            updateConsoleLogs();
            
            // Call original function
            if (type === 'log') originalLog.apply(console, args);
            else if (type === 'warn') originalWarn.apply(console, args);
            else if (type === 'error') originalError.apply(console, args);
        }
        
        console.log = (...args) => captureLog('log', ...args);
        console.warn = (...args) => captureLog('warn', ...args);
        console.error = (...args) => captureLog('error', ...args);
        
        function updateConsoleLogs() {
            consoleLogs.innerHTML = logs.map(log => 
                `<div class="${log.type}">
                    <strong>[${log.timestamp}] ${log.type.toUpperCase()}:</strong> ${log.message}
                </div>`
            ).join('');
        }
        
        // Test functions
        function runTests() {
            const tests = [];
            
            // Test 1: Check if userSearch element exists
            const userSearch = document.getElementById('userSearch');
            tests.push({
                name: 'userSearch element exists',
                passed: !!userSearch,
                message: userSearch ? '✅ Found userSearch element' : '❌ userSearch element not found'
            });
            
            // Test 2: Check if roleFilter element exists
            const roleFilter = document.getElementById('roleFilter');
            tests.push({
                name: 'roleFilter element exists',
                passed: !!roleFilter,
                message: roleFilter ? '✅ Found roleFilter element' : '❌ roleFilter element not found'
            });
            
            // Test 3: Check roleFilter options
            let roleOptionsTest = { passed: false, message: '' };
            if (roleFilter) {
                const options = roleFilter.querySelectorAll('option');
                const expectedOptions = ['', 'admin', 'staff', 'user'];
                const actualOptions = Array.from(options).map(opt => opt.value);
                
                roleOptionsTest.passed = expectedOptions.every(opt => actualOptions.includes(opt));
                roleOptionsTest.message = roleOptionsTest.passed 
                    ? `✅ All role options present: ${actualOptions.join(', ')}`
                    : `❌ Missing role options. Expected: ${expectedOptions.join(', ')}, Actual: ${actualOptions.join(', ')}`;
            } else {
                roleOptionsTest.message = '❌ Cannot test options - roleFilter not found';
            }
            tests.push(roleOptionsTest);
            
            // Test 4: Check for duplicate IDs
            const userSearchElements = document.querySelectorAll('#userSearch');
            const roleFilterElements = document.querySelectorAll('#roleFilter');
            
            tests.push({
                name: 'No duplicate userSearch IDs',
                passed: userSearchElements.length === 1,
                message: userSearchElements.length === 1 
                    ? '✅ Only one userSearch element found'
                    : `❌ Found ${userSearchElements.length} userSearch elements (should be 1)`
            });
            
            tests.push({
                name: 'No duplicate roleFilter IDs',
                passed: roleFilterElements.length === 1,
                message: roleFilterElements.length === 1 
                    ? '✅ Only one roleFilter element found'
                    : `❌ Found ${roleFilterElements.length} roleFilter elements (should be 1)`
            });
            
            // Test 5: Check if elements are in usersPage
            const usersPage = document.getElementById('usersPage');
            let inUsersPageTest = { passed: false, message: '' };
            
            if (usersPage && userSearch && roleFilter) {
                const userSearchInUsersPage = usersPage.contains(userSearch);
                const roleFilterInUsersPage = usersPage.contains(roleFilter);
                
                inUsersPageTest.passed = userSearchInUsersPage && roleFilterInUsersPage;
                inUsersPageTest.message = inUsersPageTest.passed
                    ? '✅ Both filter elements are in usersPage'
                    : `❌ Filter elements not in usersPage (userSearch: ${userSearchInUsersPage}, roleFilter: ${roleFilterInUsersPage})`;
            } else {
                inUsersPageTest.message = '❌ Cannot test - missing elements';
            }
            tests.push(inUsersPageTest);
            
            // Display results
            testResults.innerHTML = tests.map(test => 
                `<div class="${test.passed ? 'success' : 'error'}">
                    <strong>${test.name}:</strong> ${test.message}
                </div>`
            ).join('');
            
            // Show debug info
            debugInfo.innerHTML = `
                <h3>Element Information:</h3>
                <pre>
userSearch: ${userSearch ? 'FOUND' : 'NOT FOUND'}
roleFilter: ${roleFilter ? 'FOUND' : 'NOT FOUND'}
usersPage: ${usersPage ? 'FOUND' : 'NOT FOUND'}

userSearch location: ${userSearch ? userSearch.parentElement.tagName + (userSearch.parentElement.id ? '#' + userSearch.parentElement.id : '') : 'N/A'}
roleFilter location: ${roleFilter ? roleFilter.parentElement.tagName + (roleFilter.parentElement.id ? '#' + roleFilter.parentElement.id : '') : 'N/A'}

Total #userSearch elements: ${document.querySelectorAll('#userSearch').length}
Total #roleFilter elements: ${document.querySelectorAll('#roleFilter').length}
                </pre>
            `;
        }
        
        // Run tests when page loads
        window.addEventListener('load', () => {
            setTimeout(runTests, 100); // Give time for any dynamic content
        });
        
        // Also run tests when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', runTests);
        } else {
            runTests();
        }
    </script>
    
    <!-- Include the main app.js to test the actual functionality -->
    <script src="assets/js/app.js?v=20260416-16"></script>
    
    <!-- Include the HTML structure from the main page -->
    <div id="usersPage" class="page" style="display: block;">
        <div class="page-header">
            <h2>Quản lý Người dùng</h2>
            <button class="btn btn-primary" onclick="app.showUserModal()">Thêm Người dùng</button>
        </div>
        
        <div class="search-filter">
            <input type="text" id="userSearch" placeholder="Tìm kiếm người dùng..." class="form-control">
            <select id="roleFilter" class="form-control">
                <option value="">Tất cả vai trò</option>
                <option value="admin">Admin</option>
                <option value="staff">Staff</option>
                <option value="user">User</option>
            </select>
        </div>
        
        <div id="usersList" class="user-list">
            <p>Đang tải danh sách người dùng...</p>
        </div>
        
        <div id="usersPagination" class="pagination"></div>
    </div>
</body>
</html>
