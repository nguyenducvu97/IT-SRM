<!DOCTYPE html>
<html>
<head>
    <title>Debug Nhận Yêu cầu</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        .warning { color: orange; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn { padding: 8px 12px; margin: 2px; cursor: pointer; }
        .btn-success { background: #28a745; color: white; border: none; }
        .btn-info { background: #007bff; color: white; border: none; }
    </style>
</head>
<body>
    <h1>Debug Chức năng "Nhận Yêu cầu"</h1>
    
    <div class="debug-section">
        <h2>1. Kiểm tra User & Session</h2>
        <button onclick="checkAuth()" class="btn btn-info">Check Auth</button>
        <div id="authResult"></div>
    </div>
    
    <div class="debug-section">
        <h2>2. Kiểm tra tất cả requests</h2>
        <button onclick="loadAllRequests()" class="btn btn-info">Load All Requests</button>
        <div id="allRequests"></div>
    </div>
    
    <div class="debug-section">
        <h2>3. Kiểm tra requests có thể nhận (Open + chưa assign)</h2>
        <button onclick="loadAcceptableRequests()" class="btn btn-success">Load Acceptable Requests</button>
        <div id="acceptableRequests"></div>
    </div>
    
    <div class="debug-section">
        <h2>4. Test API accept_request trực tiếp</h2>
        <input type="number" id="testRequestId" placeholder="Request ID" value="12">
        <button onclick="testAcceptAPI()" class="btn btn-success">Test Accept API</button>
        <div id="apiResult"></div>
    </div>

    <script>
        let currentUser = null;
        
        async function checkAuth() {
            try {
                const response = await fetch('/it-service-request/api/auth.php?action=check_session', {
                    credentials: 'include'
                });
                const result = await response.json();
                
                const authResult = document.getElementById('authResult');
                if (result.success) {
                    currentUser = result.data;
                    authResult.innerHTML = `
                        <div class="success">✅ User logged in</div>
                        <table>
                            <tr><td>ID:</td><td>${currentUser.id}</td></tr>
                            <tr><td>Username:</td><td>${currentUser.username}</td></tr>
                            <tr><td>Full Name:</td><td>${currentUser.full_name}</td></tr>
                            <tr><td>Role:</td><td>${currentUser.role}</td></tr>
                            <tr><td>Email:</td><td>${currentUser.email}</td></tr>
                        </table>
                        ${currentUser.role === 'staff' ? 
                            '<div class="success">✅ User là Staff - CÓ THỂ nhận yêu cầu</div>' : 
                            currentUser.role === 'admin' ? 
                            '<div class="warning">⚠️ User là Admin - Thường không nhận yêu cầu</div>' :
                            '<div class="error">❌ User không phải Staff - KHÔNG THỂ nhận yêu cầu</div>'
                        }
                    `;
                } else {
                    authResult.innerHTML = `<div class="error">❌ Not logged in: ${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('authResult').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function loadAllRequests() {
            try {
                const response = await fetch('/it-service-request/api/service_requests.php?action=list', {
                    credentials: 'include'
                });
                const result = await response.json();
                
                const allRequestsDiv = document.getElementById('allRequests');
                if (result.success) {
                    let html = `<div class="info">Tổng số requests: ${result.data.length}</div>`;
                    html += '<table>';
                    html += '<tr><th>ID</th><th>Title</th><th>Status</th><th>Assigned To</th><th>Created</th><th>Category</th><th>Priority</th><th>Action</th></tr>';
                    
                    result.data.forEach(request => {
                        const canAccept = request.status === 'open' && !request.assigned_to && currentUser && currentUser.role === 'staff';
                        html += `
                            <tr>
                                <td>${request.id}</td>
                                <td>${request.title}</td>
                                <td>${request.status}</td>
                                <td>${request.assigned_to || 'NULL'}</td>
                                <td>${request.created_at}</td>
                                <td>${request.category_name}</td>
                                <td>${request.priority}</td>
                                <td>
                                    ${canAccept ? 
                                        `<button class="btn btn-success" onclick="acceptRequest(${request.id})">Nhận</button>` : 
                                        'Không thể nhận'
                                    }
                                    <a href="/it-service-request/request-detail.html?id=${request.id}" target="_blank" class="btn btn-info">Detail</a>
                                </td>
                            </tr>
                        `;
                    });
                    
                    html += '</table>';
                    allRequestsDiv.innerHTML = html;
                } else {
                    allRequestsDiv.innerHTML = `<div class="error">❌ Error: ${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('allRequests').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function loadAcceptableRequests() {
            try {
                const response = await fetch('/it-service-request/api/service_requests.php?action=list&status=open', {
                    credentials: 'include'
                });
                const result = await response.json();
                
                const acceptableDiv = document.getElementById('acceptableRequests');
                if (result.success) {
                    const acceptableRequests = result.data.filter(req => !req.assigned_to);
                    
                    if (acceptableRequests.length > 0) {
                        let html = `<div class="success">✅ Tìm thấy ${acceptableRequests.length} yêu cầu có thể nhận:</div>`;
                        html += '<table>';
                        html += '<tr><th>ID</th><th>Title</th><th>Created</th><th>Category</th><th>Action</th></tr>';
                        
                        acceptableRequests.forEach(request => {
                            html += `
                                <tr>
                                    <td>${request.id}</td>
                                    <td>${request.title}</td>
                                    <td>${request.created_at}</td>
                                    <td>${request.category_name}</td>
                                    <td>
                                        <button class="btn btn-success" onclick="acceptRequest(${request.id})">Nhận yêu cầu</button>
                                        <a href="/it-service-request/request-detail.html?id=${request.id}" target="_blank" class="btn btn-info">View Detail</a>
                                    </td>
                                </tr>
                            `;
                        });
                        
                        html += '</table>';
                        acceptableDiv.innerHTML = html;
                    } else {
                        acceptableDiv.innerHTML = '<div class="warning">⚠️ Không có yêu cầu nào có thể nhận (tất cả đã được assign hoặc không có request open)</div>';
                    }
                } else {
                    acceptableDiv.innerHTML = `<div class="error">❌ Error: ${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('acceptableRequests').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function acceptRequest(requestId) {
            try {
                const acceptData = {
                    action: 'accept_request',
                    request_id: requestId
                };
                
                const response = await fetch('/it-service-request/api/service_requests.php', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(acceptData),
                    credentials: 'include'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert(`✅ Đã nhận yêu cầu #${requestId} thành công!`);
                    // Refresh lists
                    loadAllRequests();
                    loadAcceptableRequests();
                } else {
                    alert(`❌ Lỗi nhận yêu cầu: ${result.message}`);
                }
            } catch (error) {
                alert(`❌ Error: ${error.message}`);
            }
        }
        
        async function testAcceptAPI() {
            const requestId = document.getElementById('testRequestId').value;
            if (!requestId) {
                document.getElementById('apiResult').innerHTML = '<div class="warning">⚠️ Nhập Request ID</div>';
                return;
            }
            
            try {
                const acceptData = {
                    action: 'accept_request',
                    request_id: parseInt(requestId)
                };
                
                const response = await fetch('/it-service-request/api/service_requests.php', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(acceptData),
                    credentials: 'include'
                });
                
                const result = await response.json();
                const apiResult = document.getElementById('apiResult');
                
                if (result.success) {
                    apiResult.innerHTML = `
                        <div class="success">✅ API Success!</div>
                        <div class="info">Message: ${result.message}</div>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    `;
                } else {
                    apiResult.innerHTML = `
                        <div class="error">❌ API Error!</div>
                        <div class="info">Message: ${result.message}</div>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                document.getElementById('apiResult').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        // Auto-check auth on load
        checkAuth();
    </script>
</body>
</html>
