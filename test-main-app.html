<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Main App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        select { padding: 5px; margin: 5px 0; }
        .console-output { background: #f5f5f5; padding: 10px; margin: 10px 0; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Test IT Service Request App</h1>
    
    <div class="test-section">
        <h2>Department Dropdown Test</h2>
        <form>
            <div>
                <label for="regDepartment">Phòng ban:</label>
                <select id="regDepartment" name="department" required>
                    <option value="">Chọn phòng ban</option>
                </select>
            </div>
            <div>
                <label for="regPhone">Điện thoại:</label>
                <input type="tel" id="regPhone" name="phone">
            </div>
        </form>
        <button onclick="testDepartmentAPI()">Test Department API</button>
        <button onclick="testDepartmentDropdown()">Test Department Dropdown</button>
    </div>
    
    <div class="test-section">
        <h2>Registration Test</h2>
        <button onclick="testRegistration()">Test Registration</button>
    </div>
    
    <div class="test-section">
        <h2>Console Output</h2>
        <div id="console-output" class="console-output">
            Console output will appear here...
        </div>
        <button onclick="clearConsole()">Clear Console</button>
    </div>
    
    <script>
        // Log console output to page
        const originalLog = console.log;
        const originalError = console.error;
        const output = document.getElementById('console-output');
        
        function addToOutput(message, type = 'log') {
            const div = document.createElement('div');
            div.style.color = type === 'error' ? 'red' : 'black';
            div.style.marginBottom = '5px';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToOutput(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToOutput(args.join(' '), 'error');
        };
        
        function clearConsole() {
            output.innerHTML = 'Console cleared...<br>';
        }
        
        // Test Department API
        async function testDepartmentAPI() {
            console.log('Testing Department API...');
            try {
                const response = await fetch('api/departments.php?action=dropdown');
                console.log('API Response status:', response.status);
                const data = await response.json();
                console.log('API Response data:', data);
                
                if (data.success && data.data) {
                    console.log('Departments loaded:', data.data.length);
                    data.data.forEach(dept => console.log('- ' + dept));
                } else {
                    console.error('API returned error:', data.message);
                }
            } catch (error) {
                console.error('API call failed:', error);
            }
        }
        
        // Test Department Dropdown
        async function testDepartmentDropdown() {
            console.log('Testing Department Dropdown...');
            
            const select = document.getElementById('regDepartment');
            console.log('Current options:', select.options.length);
            
            try {
                const response = await fetch('api/departments.php?action=dropdown');
                const data = await response.json();
                
                if (data.success && data.data) {
                    // Clear existing options except placeholder
                    select.innerHTML = '<option value="">Chọn phòng ban</option>';
                    
                    // Add new options
                    data.data.forEach(dept => {
                        const option = document.createElement('option');
                        option.value = dept;
                        option.textContent = dept;
                        select.appendChild(option);
                    });
                    
                    console.log('Dropdown populated with', data.data.length, 'departments');
                } else {
                    console.error('Failed to populate dropdown:', data.message);
                }
            } catch (error) {
                console.error('Failed to test dropdown:', error);
            }
        }
        
        // Test Registration
        async function testRegistration() {
            console.log('Testing Registration...');
            
            const testData = {
                action: 'register',
                username: 'testuser' + Date.now(),
                email: 'test' + Date.now() + '@example.com',
                password: '123456',
                full_name: 'Test User',
                department: 'IT',
                phone: '123456789'
            };
            
            console.log('Sending registration data:', testData);
            
            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });
                
                console.log('Registration response status:', response.status);
                const result = await response.json();
                console.log('Registration response:', result);
                
                if (result.success) {
                    console.log('✅ Registration successful!');
                } else {
                    console.error('❌ Registration failed:', result.message);
                }
            } catch (error) {
                console.error('❌ Registration error:', error);
            }
        }
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Test page loaded');
            
            // Test department dropdown automatically
            setTimeout(() => {
                testDepartmentDropdown();
            }, 1000);
        });
    </script>
</body>
</html>
