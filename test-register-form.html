<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Registration</title>
</head>
<body>
    <h1>Test Registration</h1>
    
    <form id="testForm">
        <div>
            <label>Username:</label>
            <input type="text" id="username" value="testuser5" required>
        </div>
        <div>
            <label>Email:</label>
            <input type="email" id="email" value="test5@example.com" required>
        </div>
        <div>
            <label>Full Name:</label>
            <input type="text" id="full_name" value="Test User 5" required>
        </div>
        <div>
            <label>Department:</label>
            <input type="text" id="department" value="IT" required>
        </div>
        <div>
            <label>Phone:</label>
            <input type="text" id="phone" value="123456789">
        </div>
        <div>
            <label>Password:</label>
            <input type="password" id="password" value="123456" required>
        </div>
        <button type="submit">Register</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const data = {
                action: 'register',
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                full_name: document.getElementById('full_name').value,
                department: document.getElementById('department').value,
                phone: document.getElementById('phone').value
            };
            
            console.log('Sending data:', data);
            
            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                console.log('Response:', result);
                
                document.getElementById('result').innerHTML = `
                    <h3>Response:</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                    <p>Status: ${response.status}</p>
                `;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = `
                    <h3>Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        });
    </script>
</body>
</html>
