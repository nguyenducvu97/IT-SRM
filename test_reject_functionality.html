<!DOCTYPE html>
<html>
<head>
    <title>Test Reject Functionality</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div style="padding: 20px;">
        <h1>Test Reject Request Modal</h1>
        
        <div class="test-section">
            <h2>1. Test Modal Display</h2>
            <button onclick="testShowModal()" class="btn btn-primary">
                <i class="fas fa-gavel"></i> Test Show Modal
            </button>
            <button onclick="testCloseModal()" class="btn btn-secondary">
                <i class="fas fa-times"></i> Test Close Modal
            </button>
        </div>
        
        <div class="test-section">
            <h2>2. Test with Mock Data</h2>
            <button onclick="testWithMockData()" class="btn btn-success">
                <i class="fas fa-play"></i> Test with Mock Reject Request
            </button>
        </div>
        
        <div class="test-section">
            <h2>3. Test Results</h2>
            <div id="testResults" style="background: #f5f5f5; padding: 10px; min-height: 100px; white-space: pre-wrap;"></div>
        </div>
    </div>

    <!-- Admin Reject Request Modal -->
    <div id="adminRejectModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3><i class="fas fa-user-shield"></i> Xử lý yêu cầu từ chối</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <div id="adminRejectRequestDetails">
                    <!-- Reject request details will be loaded here -->
                </div>
                
                <form id="adminRejectForm">
                    <input type="hidden" id="adminRejectId">
                    
                    <div class="form-section">
                        <h4><i class="fas fa-gavel"></i> Quyết định</h4>
                        <div class="form-group">
                            <label for="decision">Quyết định *</label>
                            <select id="decision" name="decision" required>
                                <option value="">-- Chọn quyết định --</option>
                                <option value="approved">Đồng ý từ chối</option>
                                <option value="rejected">Từ chối yêu cầu từ chối</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="reason">Lý do quyết định *</label>
                            <textarea id="reason" name="reason" rows="3" required placeholder="Nhập lý do cho quyết định của bạn..."></textarea>
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-check"></i> Xác nhận quyết định
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">
                            <i class="fas fa-times"></i> Đóng
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let testResults = [];
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
            testResults.push(`[${timestamp}] ${prefix} ${message}`);
            updateTestResults();
        }
        
        function updateTestResults() {
            document.getElementById('testResults').textContent = testResults.join('\n');
        }
        
        function testShowModal() {
            try {
                const modal = document.getElementById('adminRejectModal');
                const idInput = document.getElementById('adminRejectId');
                const form = document.getElementById('adminRejectForm');
                
                if (!modal || !idInput || !form) {
                    throw new Error('Modal elements not found');
                }
                
                idInput.value = '123';
                form.reset();
                modal.style.display = 'block';
                
                log('Modal displayed successfully', 'success');
            } catch (error) {
                log(`Error showing modal: ${error.message}`, 'error');
            }
        }
        
        function testCloseModal() {
            try {
                const modal = document.getElementById('adminRejectModal');
                if (!modal) {
                    throw new Error('Modal not found');
                }
                
                modal.style.display = 'none';
                log('Modal closed successfully', 'success');
            } catch (error) {
                log(`Error closing modal: ${error.message}`, 'error');
            }
        }
        
        function testWithMockData() {
            try {
                const modal = document.getElementById('adminRejectModal');
                const idInput = document.getElementById('adminRejectId');
                const form = document.getElementById('adminRejectForm');
                const detailsContainer = document.getElementById('adminRejectRequestDetails');
                
                if (!modal || !idInput || !form || !detailsContainer) {
                    throw new Error('Modal elements not found');
                }
                
                // Mock reject request data
                const mockRejectRequest = {
                    id: '123',
                    service_request_id: '456',
                    requester_name: 'Test User',
                    reject_reason: 'Lý do từ chối test',
                    reject_details: 'Chi tiết bổ sung test',
                    status: 'pending',
                    created_at: new Date().toISOString()
                };
                
                // Populate form
                idInput.value = mockRejectRequest.id;
                form.reset();
                
                // Populate details
                detailsContainer.innerHTML = `
                    <div class="reject-request-info">
                        <h4><i class="fas fa-info-circle"></i> Chi tiết yêu cầu từ chối</h4>
                        <div class="reject-details">
                            <div class="reject-item">
                                <strong>ID yêu cầu gốc:</strong> #${mockRejectRequest.service_request_id}
                            </div>
                            <div class="reject-item">
                                <strong>Người từ chối:</strong> ${mockRejectRequest.requester_name}
                            </div>
                            <div class="reject-item">
                                <strong>Lý do từ chối:</strong> ${mockRejectRequest.reject_reason}
                            </div>
                            <div class="reject-item">
                                <strong>Chi tiết bổ sung:</strong> ${mockRejectRequest.reject_details}
                            </div>
                            <div class="reject-item">
                                <strong>Trạng thái:</strong> <span class="badge status-pending">Pending</span>
                            </div>
                            <div class="reject-item">
                                <strong>Ngày tạo:</strong> ${new Date(mockRejectRequest.created_at).toLocaleString()}
                            </div>
                        </div>
                    </div>
                `;
                
                // Show modal
                modal.style.display = 'block';
                
                log('Modal displayed with mock data successfully', 'success');
                log(`Mock reject request ID: ${mockRejectRequest.id}`, 'info');
                log(`Service request ID: ${mockRejectRequest.service_request_id}`, 'info');
                
            } catch (error) {
                log(`Error testing with mock data: ${error.message}`, 'error');
            }
        }
        
        function closeModal() {
            const modal = document.getElementById('adminRejectModal');
            if (modal) {
                modal.style.display = 'none';
                log('Modal closed via button', 'info');
            }
        }
        
        // Initialize event listeners
        document.addEventListener('DOMContentLoaded', function() {
            log('Test page loaded', 'success');
            
            // Add close button functionality
            const closeBtn = document.querySelector('#adminRejectModal .close');
            if (closeBtn) {
                closeBtn.onclick = closeModal;
                log('Close button event listener added', 'success');
            }
            
            // Close modal when clicking outside
            window.onclick = function(event) {
                const modal = document.getElementById('adminRejectModal');
                if (event.target == modal) {
                    closeModal();
                    log('Modal closed by clicking outside', 'info');
                }
            };
            
            // Add form submit test
            const form = document.getElementById('adminRejectForm');
            if (form) {
                form.onsubmit = function(e) {
                    e.preventDefault();
                    log('Form submitted (test only)', 'success');
                    const formData = new FormData(form);
                    log(`Decision: ${formData.get('decision')}`, 'info');
                    log(`Reason: ${formData.get('reason')}`, 'info');
                    return false;
                };
                log('Form submit event listener added', 'success');
            }
        });
    </script>
</body>
</html>
