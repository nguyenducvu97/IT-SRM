<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Initialization Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        .result { margin: 10px 0; padding: 10px; }
        .success { color: green; }
        .error { color: red; }
        .warning { color: orange; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>App Initialization Test</h1>
    
    <div class="test-section">
        <h2>Step 1: Check Script Loading</h2>
        <div id="scriptResult"></div>
    </div>

    <div class="test-section">
        <h2>Step 2: Check App Object</h2>
        <div id="appResult"></div>
    </div>

    <div class="test-section">
        <h2>Step 3: Test Functions</h2>
        <div id="functionResult"></div>
        <button onclick="testFunctions()">Test Functions</button>
    </div>

    <div class="test-section">
        <h2>Step 4: Test Category Functions</h2>
        <div id="categoryResult"></div>
        <button onclick="testCategoryFunctions()">Test Category Functions</button>
    </div>

    <!-- Load the app script -->
    <script src="assets/js/app.js?v=20260417-9"></script>
    
    <script>
        let testResults = [];
        
        function addTestResult(message, type = 'info') {
            testResults.push({message, type, time: new Date().toLocaleTimeString()});
            updateTestDisplay();
        }
        
        function updateTestDisplay() {
            const containers = {
                scriptResult: testResults.filter(r => r.message.includes('Script') || r.message.includes('Load')),
                appResult: testResults.filter(r => r.message.includes('App') || r.message.includes('Object')),
                functionResult: testResults.filter(r => r.message.includes('Function')),
                categoryResult: testResults.filter(r => r.message.includes('Category'))
            };
            
            Object.keys(containers).forEach(containerId => {
                const container = document.getElementById(containerId);
                if (container) {
                    container.innerHTML = containers[containerId].map(r => 
                        `<div class="${r.type}">[${r.time}] ${r.message}</div>`
                    ).join('');
                }
            });
        }
        
        // Check script loading
        setTimeout(() => {
            addTestResult('Script loaded successfully', 'success');
            
            // Check if window.app exists
            if (typeof window.app !== 'undefined') {
                addTestResult('window.app object exists', 'success');
                
                // Check if app is instance of ITServiceApp
                if (window.app.constructor.name === 'ITServiceApp') {
                    addTestResult('App is ITServiceApp instance', 'success');
                } else {
                    addTestResult('App is not ITServiceApp instance', 'warning');
                }
                
                // Check app properties
                if (window.app.currentUser) {
                    addTestResult('App has currentUser: ' + (window.app.currentUser.username || 'Not set'), 'success');
                } else {
                    addTestResult('App currentUser not set', 'warning');
                }
                
                if (window.app.currentPage) {
                    addTestResult('App currentPage: ' + window.app.currentPage, 'success');
                } else {
                    addTestResult('App currentPage not set', 'warning');
                }
                
            } else {
                addTestResult('window.app object NOT FOUND', 'error');
            }
        }, 500);
        
        function testFunctions() {
            addTestResult('Testing key functions...', 'info');
            
            if (typeof window.app !== 'undefined') {
                const functions = [
                    'handleCategorySubmit',
                    'showCategoryModal', 
                    'apiCall',
                    'showNotification',
                    'loadCategories',
                    'editCategory',
                    'deleteCategory'
                ];
                
                functions.forEach(func => {
                    if (typeof window.app[func] === 'function') {
                        addTestResult(`Function ${func}: AVAILABLE`, 'success');
                    } else {
                        addTestResult(`Function ${func}: MISSING`, 'error');
                    }
                });
            } else {
                addTestResult('Cannot test functions - window.app not found', 'error');
            }
        }
        
        async function testCategoryFunctions() {
            addTestResult('Testing category functions...', 'info');
            
            if (typeof window.app !== 'undefined') {
                try {
                    // Test showCategoryModal
                    if (typeof window.app.showCategoryModal === 'function') {
                        addTestResult('showCategoryModal: Testing...', 'info');
                        window.app.showCategoryModal();
                        addTestResult('showCategoryModal: SUCCESS', 'success');
                    } else {
                        addTestResult('showCategoryModal: NOT AVAILABLE', 'error');
                    }
                    
                    // Test apiCall
                    if (typeof window.app.apiCall === 'function') {
                        addTestResult('apiCall: Testing...', 'info');
                        const response = await window.app.apiCall('api/categories.php');
                        addTestResult('apiCall: SUCCESS - ' + (response.success ? 'Data loaded' : 'API error'), 'success');
                    } else {
                        addTestResult('apiCall: NOT AVAILABLE', 'error');
                    }
                    
                } catch (error) {
                    addTestResult('Category function test ERROR: ' + error.message, 'error');
                }
            } else {
                addTestResult('Cannot test category functions - window.app not found', 'error');
            }
        }
        
        // Auto-run function test after script loads
        setTimeout(testFunctions, 1000);
    </script>
</body>
</html>
