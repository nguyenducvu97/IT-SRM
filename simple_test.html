<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h2>API Test</h2>
    <button onclick="testLogin()">Test Login</button>
    <button onclick="testSession()">Test Session</button>
    <button onclick="testServiceRequests()">Test Service Requests</button>
    
    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc; white-space: pre-wrap;"></div>

    <script>
        async function testLogin() {
            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        action: 'login',
                        username: 'admin',
                        password: 'admin123'
                    })
                });
                
                const result = await response.json();
                document.getElementById('result').textContent = 'Login Test Result:\n' + JSON.stringify(result, null, 2);
            } catch (error) {
                document.getElementById('result').textContent = 'Login Test Error:\n' + error.message;
            }
        }
        
        async function testSession() {
            try {
                const response = await fetch('api/auth.php?action=check_session', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                const result = await response.json();
                document.getElementById('result').textContent = 'Session Test Result:\n' + JSON.stringify(result, null, 2);
            } catch (error) {
                document.getElementById('result').textContent = 'Session Test Error:\n' + error.message;
            }
        }
        
        async function testServiceRequests() {
            try {
                const response = await fetch('api/service_requests.php?action=list', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                const result = await response.json();
                document.getElementById('result').textContent = 'Service Requests Test Result:\n' + JSON.stringify(result, null, 2);
            } catch (error) {
                document.getElementById('result').textContent = 'Service Requests Test Error:\n' + error.message;
            }
        }
    </script>
</body>
</html>
