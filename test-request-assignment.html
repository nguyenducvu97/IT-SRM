<!DOCTYPE html>
<html>
<head>
    <title>Test Request Assignment</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { padding: 8px; width: 300px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .debug { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <h2>🧪 Test Request Assignment</h2>
    
    <div class="form-group">
        <label for="request_id">Request ID:</label>
        <input type="number" id="request_id" placeholder="Enter request ID to assign">
    </div>
    
    <button onclick="testAcceptRequest()">Accept Request</button>
    <button onclick="checkRequestStatus()">Check Status</button>
    
    <div id="result"></div>
    
    <h3>📋 Available Requests</h3>
    <div id="requests-list">Loading...</div>
    
    <script>
        function testAcceptRequest() {
            const requestId = document.getElementById('request_id').value;
            if (!requestId) {
                showResult('Please enter a request ID', 'error');
                return;
            }
            
            const data = {
                action: 'accept_request',
                request_id: parseInt(requestId)
            };
            
            showResult('⏳ Processing request assignment...', 'debug');
            
            fetch('api/service_requests.php', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    showResult(`✅ ${result.message}`, 'success');
                    loadAvailableRequests();
                } else {
                    showResult(`❌ ${result.message}`, 'error');
                }
            })
            .catch(error => {
                showResult(`❌ Network error: ${error.message}`, 'error');
            });
        }
        
        function checkRequestStatus() {
            const requestId = document.getElementById('request_id').value;
            if (!requestId) {
                showResult('Please enter a request ID', 'error');
                return;
            }
            
            fetch(`api/service_requests.php?action=get&id=${requestId}`)
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    const request = result.data;
                    showResult(`
                        📋 Request Details:<br>
                        <strong>ID:</strong> ${request.id}<br>
                        <strong>Title:</strong> ${request.title}<br>
                        <strong>Status:</strong> ${request.status}<br>
                        <strong>Assigned to:</strong> ${request.assigned_name || 'Unassigned'}<br>
                        <strong>Priority:</strong> ${request.priority}
                    `, 'debug');
                } else {
                    showResult(`❌ ${result.message}`, 'error');
                }
            })
            .catch(error => {
                showResult(`❌ Network error: ${error.message}`, 'error');
            });
        }
        
        function loadAvailableRequests() {
            fetch('api/service_requests.php?action=list&limit=20')
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    const requests = result.data.requests.filter(r => 
                        r.status === 'open' || r.status === 'request_support'
                    );
                    
                    let html = '<table border="1" cellpadding="5" style="border-collapse: collapse;">';
                    html += '<tr><th>ID</th><th>Title</th><th>Status</th><th>Priority</th><th>Created</th></tr>';
                    
                    requests.forEach(request => {
                        html += `<tr>
                            <td>${request.id}</td>
                            <td>${request.title}</td>
                            <td>${request.status}</td>
                            <td>${request.priority}</td>
                            <td>${new Date(request.created_at).toLocaleString()}</td>
                        </tr>`;
                    });
                    
                    html += '</table>';
                    document.getElementById('requests-list').innerHTML = html;
                } else {
                    document.getElementById('requests-list').innerHTML = 'Failed to load requests';
                }
            })
            .catch(error => {
                document.getElementById('requests-list').innerHTML = 'Error: ' + error.message;
            });
        }
        
        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<div class="${type}">${message}</div>`;
        }
        
        // Load available requests on page load
        loadAvailableRequests();
    </script>
</body>
</html>
