<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple JavaScript Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        .result { margin: 10px 0; padding: 10px; }
        .success { color: green; }
        .error { color: red; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        input { padding: 5px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Simple JavaScript Test - Add Category</h1>
    
    <div class="test-section">
        <h2>Test Form</h2>
        <form id="testForm">
            <input type="text" id="categoryName" placeholder="Tên danh muc" value="Test Category" required>
            <input type="text" id="categoryDescription" placeholder="Mô tã" value="Test description">
            <button type="submit">Thêm Danh Muc</button>
        </form>
        <div id="result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Manual API Test</h2>
        <button onclick="testAPI()">Test API Direct</button>
        <div id="apiResult" class="result"></div>
    </div>

    <script>
        // Simple test function
        function log(message, type = 'info') {
            const result = document.getElementById('result');
            result.innerHTML += `<div class="${type}">${message}</div>`;
        }

        // Test API call
        async function testAPI() {
            const apiResult = document.getElementById('apiResult');
            apiResult.innerHTML = '<div>Testing API...</div>';
            
            try {
                const data = {
                    name: 'Test Category ' + new Date().getTime(),
                    description: 'Test description from JavaScript'
                };
                
                const response = await fetch('api/categories.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json; charset=UTF-8'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                apiResult.innerHTML = `
                    <div class="${result.success ? 'success' : 'error'}">
                        HTTP Status: ${response.status}<br>
                        Success: ${result.success}<br>
                        Message: ${result.message}<br>
                        ${result.success ? 'Category ID: ' + result.data.id : ''}
                    </div>
                `;
                
            } catch (error) {
                apiResult.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        // Test form submission
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('categoryName').value;
            const description = document.getElementById('categoryDescription').value;
            
            log('Submitting form...', 'info');
            log('Name: ' + name, 'info');
            log('Description: ' + description, 'info');
            
            try {
                const data = { name, description };
                
                const response = await fetch('api/categories.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json; charset=UTF-8'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    log('SUCCESS: Category added with ID: ' + result.data.id, 'success');
                    document.getElementById('categoryName').value = 'Test Category ' + new Date().getTime();
                } else {
                    log('FAILED: ' + result.message, 'error');
                }
                
            } catch (error) {
                log('ERROR: ' + error.message, 'error');
            }
        });

        // Auto-run API test
        setTimeout(testAPI, 1000);
    </script>
</body>
</html>
