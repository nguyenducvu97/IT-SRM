<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Auth Endpoints</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; white-space: pre-wrap; }
        button { padding: 10px 15px; margin: 5px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Debug Auth Endpoints</h1>
    
    <div class="test-section">
        <h2>1. Test Database Connection</h2>
        <button onclick="testSimple()">Test Database</button>
        <div id="simple-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. Test Minimal Auth</h2>
        <button onclick="testAuthTest()">Test Auth Test</button>
        <div id="authtest-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. Test Original Auth API</h2>
        <button onclick="testOriginalAuth()">Test Original Auth</button>
        <div id="auth-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. Test Auth Debug (Detailed)</h2>
        <button onclick="testAuthDebug()">Test Auth Debug</button>
        <div id="debug-result" class="result"></div>
    </div>

    <script>
        async function testSimple() {
            const result = document.getElementById('simple-result');
            result.textContent = 'Loading...';
            
            try {
                const response = await fetch('simple-test.php');
                const text = await response.text();
                
                if (response.ok) {
                    try {
                        const data = JSON.parse(text);
                        result.textContent = `✅ Success!\n\n${JSON.stringify(data, null, 2)}`;
                    } catch (e) {
                        result.textContent = `⚠️ Not JSON format:\n\n${text}`;
                    }
                } else {
                    result.textContent = `❌ Error ${response.status}:\n\n${text}`;
                }
            } catch (error) {
                result.textContent = `❌ Network Error: ${error.message}`;
            }
        }
        
        async function testAuthTest() {
            const result = document.getElementById('authtest-result');
            result.textContent = 'Loading...';
            
            try {
                const response = await fetch('api/auth-test.php?action=check_session', {
                    credentials: 'include'
                });
                const text = await response.text();
                
                if (response.ok) {
                    try {
                        const data = JSON.parse(text);
                        result.textContent = `✅ Success!\n\n${JSON.stringify(data, null, 2)}`;
                    } catch (e) {
                        result.textContent = `⚠️ Not JSON format:\n\n${text}`;
                    }
                } else {
                    result.textContent = `❌ Error ${response.status}:\n\n${text}`;
                }
            } catch (error) {
                result.textContent = `❌ Network Error: ${error.message}`;
            }
        }
        
        async function testOriginalAuth() {
            const result = document.getElementById('auth-result');
            result.textContent = 'Loading...';
            
            try {
                const response = await fetch('api/auth.php?action=check_session', {
                    credentials: 'include'
                });
                const text = await response.text();
                
                // Always show the raw response first
                result.textContent = `Status: ${response.status}\nStatus Text: ${response.statusText}\n\nRaw Response:\n${text}\n\n`;
                
                if (response.ok) {
                    try {
                        const data = JSON.parse(text);
                        result.textContent += `✅ Parsed JSON:\n\n${JSON.stringify(data, null, 2)}`;
                    } catch (e) {
                        result.textContent += `⚠️ Not JSON format (see raw response above)`;
                    }
                } else {
                    result.textContent += `❌ HTTP Error ${response.status} (see raw response above)`;
                }
            } catch (error) {
                result.textContent = `❌ Network Error: ${error.message}`;
            }
        }
        
        async function testAuthDebug() {
            const result = document.getElementById('debug-result');
            result.textContent = 'Loading...';
            
            try {
                const response = await fetch('api/auth-debug.php?action=check_session', {
                    credentials: 'include'
                });
                const text = await response.text();
                
                if (response.ok) {
                    try {
                        const data = JSON.parse(text);
                        result.textContent = `✅ Success!\n\n${JSON.stringify(data, null, 2)}`;
                    } catch (e) {
                        result.textContent = `⚠️ Not JSON format:\n\n${text}`;
                    }
                } else {
                    result.textContent = `❌ Error ${response.status}:\n\n${text}`;
                }
            } catch (error) {
                result.textContent = `❌ Network Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
