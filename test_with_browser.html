<!DOCTYPE html>
<html>
<head>
    <title>Complete System Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; white-space: pre-wrap; font-family: monospace; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>IT Service Request System - Complete Test</h1>
    
    <div class="test-section">
        <h2>1. Database Connection Test</h2>
        <button onclick="testDatabase()">Test Database</button>
        <div id="databaseResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. Authentication Test</h2>
        <button onclick="testLogin()">Test Login</button>
        <button onclick="testSession()">Test Session</button>
        <div id="authResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. API Access Test</h2>
        <button onclick="testServiceRequests()">Test Service Requests</button>
        <button onclick="testCategories()">Test Categories</button>
        <div id="apiResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. Full Application Test</h2>
        <button onclick="testFullApp()">Open Main Application</button>
        <div id="fullAppResult" class="result"></div>
    </div>

    <script>
        async function testDatabase() {
            const result = document.getElementById('databaseResult');
            try {
                const response = await fetch('test_db_connection.php');
                const text = await response.text();
                result.textContent = 'Database Test Result:\n' + text;
                result.className = 'result success';
            } catch (error) {
                result.textContent = 'Database Test Error:\n' + error.message;
                result.className = 'result error';
            }
        }
        
        async function testLogin() {
            const result = document.getElementById('authResult');
            try {
                const response = await fetch('api/auth.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        action: 'login',
                        username: 'admin',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                result.textContent = 'Login Test Result:\n' + JSON.stringify(data, null, 2);
                result.className = data.success ? 'result success' : 'result error';
            } catch (error) {
                result.textContent = 'Login Test Error:\n' + error.message;
                result.className = 'result error';
            }
        }
        
        async function testSession() {
            const result = document.getElementById('authResult');
            try {
                const response = await fetch('api/auth.php?action=check_session', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                const data = await response.json();
                result.textContent = 'Session Test Result:\n' + JSON.stringify(data, null, 2);
                result.className = data.success ? 'result success' : 'result error';
            } catch (error) {
                result.textContent = 'Session Test Error:\n' + error.message;
                result.className = 'result error';
            }
        }
        
        async function testServiceRequests() {
            const result = document.getElementById('apiResult');
            try {
                const response = await fetch('api/service_requests.php?action=list', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                const data = await response.json();
                result.textContent = 'Service Requests Test Result:\n' + JSON.stringify(data, null, 2);
                result.className = data.success ? 'result success' : 'result error';
            } catch (error) {
                result.textContent = 'Service Requests Test Error:\n' + error.message;
                result.className = 'result error';
            }
        }
        
        async function testCategories() {
            const result = document.getElementById('apiResult');
            try {
                const response = await fetch('api/categories.php', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                const data = await response.json();
                result.textContent = 'Categories Test Result:\n' + JSON.stringify(data, null, 2);
                result.className = data.success ? 'result success' : 'result error';
            } catch (error) {
                result.textContent = 'Categories Test Error:\n' + error.message;
                result.className = 'result error';
            }
        }
        
        function testFullApp() {
            const result = document.getElementById('fullAppResult');
            result.textContent = 'Opening main application in new tab...';
            result.className = 'result';
            window.open('index.html', '_blank');
        }
        
        // Auto-run database test on page load
        window.addEventListener('load', testDatabase);
    </script>
</body>
</html>
