<!DOCTYPE html>
<html>
<head>
    <title>Debug Request Detail Button</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .debug-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        .warning { color: orange; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn { padding: 8px 12px; margin: 2px; cursor: pointer; text-decoration: none; }
        .btn-success { background: #28a745; color: white; border: none; }
        .btn-info { background: #007bff; color: white; border: none; }
        iframe { width: 100%; height: 600px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Debug Request Detail - Nút "Nhận Yêu cầu"</h1>
    
    <div class="debug-section">
        <h2>1. Kiểm tra User</h2>
        <button onclick="checkUser()" class="btn btn-info">Check User</button>
        <div id="userInfo"></div>
    </div>
    
    <div class="debug-section">
        <h2>2. Kiểm tra Requests Open</h2>
        <button onclick="checkOpenRequests()" class="btn btn-info">Check Open Requests</button>
        <div id="openRequests"></div>
    </div>
    
    <div class="debug-section">
        <h2>3. Test Request Detail Page</h2>
        <div id="requestDetailTest"></div>
    </div>
    
    <div class="debug-section">
        <h2>4. Debug Conditions</h2>
        <div id="debugConditions"></div>
    </div>

    <script>
        let currentUser = null;
        
        async function checkUser() {
            try {
                const response = await fetch('/it-service-request/api/auth.php?action=check_session', {
                    credentials: 'include'
                });
                const result = await response.json();
                
                const userInfo = document.getElementById('userInfo');
                if (result.success) {
                    currentUser = result.data;
                    userInfo.innerHTML = `
                        <div class="success">✅ User logged in</div>
                        <table>
                            <tr><td>ID:</td><td>${currentUser.id}</td></tr>
                            <tr><td>Username:</td><td>${currentUser.username}</td></tr>
                            <tr><td>Full Name:</td><td>${currentUser.full_name}</td></tr>
                            <tr><td>Role:</td><td>${currentUser.role}</td></tr>
                            <tr><td>Email:</td><td>${currentUser.email}</td></tr>
                        </table>
                        ${currentUser.role === 'staff' ? 
                            '<div class="success">✅ User là Staff - ĐỦ ĐIỀU KIỆN nhận yêu cầu</div>' : 
                            '<div class="error">❌ User không phải Staff</div>'
                        }
                    `;
                } else {
                    userInfo.innerHTML = `<div class="error">❌ Not logged in: ${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('userInfo').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function checkOpenRequests() {
            try {
                const response = await fetch('/it-service-request/api/service_requests.php?action=list&status=open', {
                    credentials: 'include'
                });
                const result = await response.json();
                
                const openRequestsDiv = document.getElementById('openRequests');
                if (result.success) {
                    let html = `<div class="info">Tìm thấy ${result.data.length} requests open:</div>`;
                    html += '<table>';
                    html += '<tr><th>ID</th><th>Title</th><th>Assigned To</th><th>Created</th><th>Condition Check</th><th>Action</th></tr>';
                    
                    result.data.forEach(request => {
                        const canAccept = request.status === 'open' && !request.assigned_to && currentUser && currentUser.role === 'staff';
                        const conditionCheck = {
                            'status === "open"': request.status === 'open',
                            '!request.assigned_to': !request.assigned_to,
                            'currentUser.role === "staff"': currentUser && currentUser.role === 'staff',
                            'canAccept': canAccept
                        };
                        
                        html += `
                            <tr>
                                <td>${request.id}</td>
                                <td>${request.title}</td>
                                <td>${request.assigned_to || 'NULL'}</td>
                                <td>${request.created_at}</td>
                                <td>
                                    <table style="font-size: 0.8em;">
                                        <tr><td>status === "open":</td><td>${conditionCheck['status === "open"] ? '✅' : '❌'}</td></tr>
                                        <tr><td>!request.assigned_to:</td><td>${conditionCheck['!request.assigned_to'] ? '✅' : '❌'}</td></tr>
                                        <tr><td>role === "staff":</td><td>${conditionCheck['currentUser.role === "staff"] ? '✅' : '❌'}</td></tr>
                                        <tr><td><strong>canAccept:</strong></td><td><strong>${canAccept ? '✅' : '❌'}</strong></td></tr>
                                    </table>
                                </td>
                                <td>
                                    <a href="/it-service-request/request-detail.html?id=${request.id}" target="_blank" class="btn btn-info">Open Detail</a>
                                </td>
                            </tr>
                        `;
                    });
                    
                    html += '</table>';
                    openRequestsDiv.innerHTML = html;
                } else {
                    openRequestsDiv.innerHTML = `<div class="error">❌ Error: ${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('openRequests').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        function testRequestDetail() {
            if (!currentUser) {
                document.getElementById('requestDetailTest').innerHTML = '<div class="warning">⚠️ Vui lòng check user trước</div>';
                return;
            }
            
            // Test với một request cụ thể
            const testRequestId = 9; // ID của request open chưa assign
            
            const html = `
                <h3>Test Request Detail Page cho Request #${testRequestId}</h3>
                <p><strong>Điều kiện để hiện button:</strong></p>
                <ul>
                    <li>request.status === 'open' ✅</li>
                    <li>!request.assigned_to ✅</li>
                    <li>currentUser.role === 'staff' ✅</li>
                </ul>
                
                <p><a href="/it-service-request/request-detail.html?id=${testRequestId}" target="_blank" class="btn btn-success">
                    Mở Request Detail #${testRequestId} trong tab mới
                </a></p>
                
                <p><strong>Nếu không thấy button "Nhận yêu cầu", kiểm tra:</strong></p>
                <ol>
                    <li>Console JavaScript có lỗi không?</li>
                    <li>Request data có đúng không?</li>
                    <li>Button có bị CSS ẩn không?</li>
                </ol>
                
                <iframe src="/it-service-request/request-detail.html?id=${testRequestId}" id="detailFrame"></iframe>
            `;
            
            document.getElementById('requestDetailTest').innerHTML = html;
        }
        
        function debugConditions() {
            if (!currentUser) {
                document.getElementById('debugConditions').innerHTML = '<div class="warning">⚠️ Vui lòng check user trước</div>';
                return;
            }
            
            const html = `
                <h3>Debug Conditions cho button "Nhận yêu cầu"</h3>
                <table>
                    <tr><th>Condition</th><th>Value</th><th>Result</th></tr>
                    <tr><td>currentUser.id</td><td>${currentUser.id}</td><td>-</td></tr>
                    <tr><td>currentUser.username</td><td>${currentUser.username}</td><td>-</td></tr>
                    <tr><td>currentUser.role</td><td>${currentUser.role}</td><td>${currentUser.role === 'staff' ? '✅' : '❌'}</td></tr>
                    <tr><td>request.status === 'open'</td><td>open</td><td>✅</td></tr>
                    <tr><td>!request.assigned_to</td><td>null</td><td>✅</td></tr>
                    <tr><td>Final: canAccept</td><td>-</td><td>✅</td></tr>
                </table>
                
                <h4>Code trong request-detail.js (dòng 3229-3240):</h4>
                <pre>
\${request.status === 'open' && !request.assigned_to ? 
    \`&lt;button class="btn btn-success" onclick="requestDetailApp.acceptRequest(\${request.id})"&gt;
        &lt;i class="fas fa-check"&gt;&lt;/i&gt; Nhận yêu cầu
    &lt;/button&gt;\` : ''
\}
                </pre>
                
                <h4>Cách kiểm tra:</h4>
                <ol>
                    <li>Mở request detail của một request open chưa assign</li>
                    <li>Mở Developer Console (F12)</li>
                    <li>Tìm kiếm "acceptRequest" hoặc "Nhận yêu cầu"</li>
                    <li>Kiểm tra console.log debug conditions</li>
                </ol>
            `;
            
            document.getElementById('debugConditions').innerHTML = html;
        }
        
        // Auto-run checks
        checkUser();
        setTimeout(() => {
            checkOpenRequests();
            testRequestDetail();
            debugConditions();
        }, 1000);
    </script>
</body>
</html>
