<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step by Step Initialization Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .step { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .result { margin: 10px 0; padding: 10px; }
        .success { color: green; }
        .error { color: red; }
        .warning { color: orange; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Step by Step Initialization Test</h1>
    
    <div class="step">
        <h2>Step 1: Load Script</h2>
        <div id="step1"></div>
    </div>
    
    <div class="step">
        <h2>Step 2: Check Class</h2>
        <div id="step2"></div>
        <button onclick="checkClass()">Check ITServiceApp Class</button>
    </div>
    
    <div class="step">
        <h2>Step 3: Create Instance</h2>
        <div id="step3"></div>
        <button onclick="createInstance()">Create Instance</button>
    </div>
    
    <div class="step">
        <h2>Step 4: Test Methods</h2>
        <div id="step4"></div>
        <button onclick="testMethods()">Test Methods</button>
    </div>
    
    <div class="step">
        <h2>Step 5: Test Category Functions</h2>
        <div id="step5"></div>
        <button onclick="testCategoryFunctions()">Test Category Functions</button>
    </div>
    
    <script>
        function log(stepId, message, type = 'info') {
            const step = document.getElementById(stepId);
            step.innerHTML += `<div class="${type}">${message}</div>`;
        }
        
        // Step 1: Load script
        log('step1', 'Loading app.js...', 'info');
        const script = document.createElement('script');
        script.src = 'assets/js/app.js?v=20260417-10';
        
        script.onload = function() {
            log('step1', 'Script loaded successfully', 'success');
        };
        
        script.onerror = function() {
            log('step1', 'Script failed to load', 'error');
        };
        
        document.head.appendChild(script);
        
        // Step 2: Check class
        function checkClass() {
            log('step2', 'Checking ITServiceApp class...', 'info');
            
            if (typeof ITServiceApp !== 'undefined') {
                log('step2', 'ITServiceApp class exists', 'success');
                
                // Check constructor
                if (typeof ITServiceApp.prototype.constructor === 'function') {
                    log('step2', 'Constructor is valid', 'success');
                } else {
                    log('step2', 'Constructor is invalid', 'error');
                }
                
            } else {
                log('step2', 'ITServiceApp class NOT FOUND', 'error');
            }
        }
        
        // Step 3: Create instance
        function createInstance() {
            log('step3', 'Creating instance...', 'info');
            
            try {
                window.app = new ITServiceApp();
                log('step3', 'Instance created successfully', 'success');
                log('step3', 'Instance type: ' + typeof window.app, 'success');
                log('step3', 'Instance constructor: ' + window.app.constructor.name, 'success');
                
            } catch (error) {
                log('step3', 'Instance creation FAILED: ' + error.message, 'error');
                log('step3', 'Stack trace: ' + error.stack, 'error');
            }
        }
        
        // Step 4: Test methods
        function testMethods() {
            if (typeof window.app !== 'undefined') {
                log('step4', 'Testing basic methods...', 'info');
                
                const methods = ['handleCategorySubmit', 'apiCall', 'showNotification'];
                methods.forEach(method => {
                    if (typeof window.app[method] === 'function') {
                        log('step4', method + ': AVAILABLE', 'success');
                    } else {
                        log('step4', method + ': MISSING', 'error');
                    }
                });
            } else {
                log('step4', 'Cannot test - window.app not found', 'error');
            }
        }
        
        // Step 5: Test category functions
        async function testCategoryFunctions() {
            if (typeof window.app !== 'undefined') {
                log('step5', 'Testing category functions...', 'info');
                
                try {
                    // Test apiCall
                    log('step5', 'Testing apiCall...', 'info');
                    const response = await window.app.apiCall('api/categories.php');
                    log('step5', 'apiCall: ' + (response.success ? 'SUCCESS' : 'FAILED'), response.success ? 'success' : 'error');
                    
                } catch (error) {
                    log('step5', 'Category function test ERROR: ' + error.message, 'error');
                }
            } else {
                log('step5', 'Cannot test - window.app not found', 'error');
            }
        }
        
        // Error handlers
        window.addEventListener('error', function(e) {
            log('step1', 'JavaScript Error: ' + e.message + ' at ' + e.filename + ':' + e.lineno, 'error');
        });
        
        window.addEventListener('unhandledrejection', function(e) {
            log('step1', 'Unhandled Promise Rejection: ' + e.reason, 'error');
        });
    </script>
</body>
</html>
