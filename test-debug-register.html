<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Registration Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin: 10px 0; }
        label { display: block; margin-bottom: 5px; }
        input, select { padding: 8px; width: 300px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .result { margin: 20px 0; padding: 15px; background: #f5f5f5; border: 1px solid #ccc; }
        .error { background: #ffe6e6; border-color: #ff0000; }
        .success { background: #e6ffe6; border-color: #00ff00; }
    </style>
</head>
<body>
    <h1>Debug Registration Test</h1>
    
    <form id="testForm">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" value="testuser6" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" value="test6@example.com" required>
        </div>
        <div class="form-group">
            <label for="full_name">Full Name:</label>
            <input type="text" id="full_name" value="Test User 6" required>
        </div>
        <div class="form-group">
            <label for="department">Department:</label>
            <select id="department" required>
                <option value="">Select Department</option>
                <option value="IT" selected>IT</option>
                <option value="HR">HR</option>
                <option value="Finance">Finance</option>
            </select>
        </div>
        <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" value="123456789">
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" value="123456" required>
        </div>
        <button type="submit">Register (Debug)</button>
    </form>
    
    <div id="result" class="result"></div>
    
    <script>
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const data = {
                action: 'register',
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                full_name: document.getElementById('full_name').value,
                department: document.getElementById('department').value,
                phone: document.getElementById('phone').value
            };
            
            console.log('Sending data:', data);
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Sending request...</p>';
            
            try {
                const response = await fetch('debug-auth.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                // Get response text first to see what's actually returned
                const responseText = await response.text();
                console.log('Response text:', responseText);
                
                // Try to parse as JSON
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (parseError) {
                    console.error('JSON parse error:', parseError);
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>JSON Parse Error:</h3>
                            <p>${parseError.message}</p>
                            <h3>Raw Response:</h3>
                            <pre>${responseText}</pre>
                            <h3>Response Status:</h3>
                            <p>${response.status}</p>
                        </div>
                    `;
                    return;
                }
                
                resultDiv.innerHTML = `
                    <div class="${result.success ? 'success' : 'error'}">
                        <h3>Response:</h3>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                        <p>Status: ${response.status}</p>
                    </div>
                `;
                
            } catch (error) {
                console.error('Fetch error:', error);
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>Network Error:</h3>
                        <pre>${error.message}</pre>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
