<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test KPI Modal</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Test KPI Modal</h2>
        
        <!-- Test Button -->
        <button id="configKPIBtn" class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#kpiConfigModal">
            <i class="fas fa-cogs"></i> <span>Cài KPI</span>
        </button>
        
        <!-- Manual Trigger Button -->
        <button class="btn btn-primary ms-2" onclick="showKPIConfigModal()">
            <i class="fas fa-cogs"></i> Manual Trigger
        </button>
    </div>

    <!-- KPI Configuration Modal -->
    <div class="modal fade" id="kpiConfigModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="fas fa-cogs me-2"></i>Cấu hình KPI
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Modal content test</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Manual trigger function
        function showKPIConfigModal() {
            console.log('Manual trigger called');
            const modal = new bootstrap.Modal(document.getElementById('kpiConfigModal'));
            modal.show();
        }
        
        // Check if Bootstrap is loaded
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded');
            console.log('Bootstrap version:', typeof bootstrap !== 'undefined' ? 'loaded' : 'not loaded');
            
            // Test button click
            document.getElementById('configKPIBtn').addEventListener('click', function(e) {
                console.log('Button clicked');
                console.log('Data attributes:', {
                    toggle: this.getAttribute('data-bs-toggle'),
                    target: this.getAttribute('data-bs-target')
                });
            });
        });
    </script>
</body>
</html>
