<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Syntax Check</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; }
        .success { color: green; }
        .error { color: red; }
        .warning { color: orange; }
    </style>
</head>
<body>
    <h1>JavaScript Syntax Check</h1>
    
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        function addResult(message, type) {
            results.innerHTML += `<div class="${type}">${message}</div>`;
        }
        
        addResult('Starting JavaScript syntax check...', 'info');
        
        // Check for syntax errors by trying to load the script
        const script = document.createElement('script');
        script.src = 'assets/js/app.js?v=20260417-9';
        
        script.onload = function() {
            addResult('Script loaded successfully', 'success');
            
            // Check if ITServiceApp class exists
            if (typeof ITServiceApp !== 'undefined') {
                addResult('ITServiceApp class exists', 'success');
                
                // Try to create instance
                try {
                    const testApp = new ITServiceApp();
                    addResult('ITServiceApp instance created successfully', 'success');
                } catch (error) {
                    addResult('Error creating ITServiceApp instance: ' + error.message, 'error');
                }
            } else {
                addResult('ITServiceApp class NOT FOUND', 'error');
            }
            
            // Check if window.app exists
            setTimeout(() => {
                if (typeof window.app !== 'undefined') {
                    addResult('window.app exists', 'success');
                } else {
                    addResult('window.app NOT FOUND - DOMContentLoaded may not have fired', 'warning');
                }
            }, 100);
        };
        
        script.onerror = function() {
            addResult('Script failed to load - Check file path or server error', 'error');
        };
        
        document.head.appendChild(script);
        
        // Add global error handler
        window.addEventListener('error', function(e) {
            addResult('JavaScript Error: ' + e.message + ' at ' + e.filename + ':' + e.lineno, 'error');
        });
        
        window.addEventListener('unhandledrejection', function(e) {
            addResult('Unhandled Promise Rejection: ' + e.reason, 'error');
        });
    </script>
</body>
</html>
